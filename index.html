<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/logo.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tembera U RWANDA</title>
  </head>
  <body>
    <div id="app"></div>

    <div id="google_translate_element" style="position:absolute; left:-9999px; top:0;"></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'fr,rw,es,it',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }

      window.changeLanguage = function(lang) {
        var attempts = 0;
        var maxAttempts = 20; // ~6 seconds
        var timer = setInterval(function() {
          attempts++;
          var select = document.querySelector('select.goog-te-combo') || document.querySelector('#google_translate_element select');
          if (select) {
            select.value = lang;
            var changeEvent = document.createEvent('HTMLEvents');
            changeEvent.initEvent('change', true, true);
            select.dispatchEvent(changeEvent);
            select.dispatchEvent(new Event('change', { bubbles: true }));
            if (typeof select.blur === 'function') select.blur();
            clearInterval(timer);
            return;
          }
          if (attempts >= maxAttempts) {
            clearInterval(timer);
          }
        }, 300);
      };
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
